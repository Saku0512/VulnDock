name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "22"
  WAILS_VERSION: "v2.12.0"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            asset_os: linux
          - name: macOS
            os: macos-latest
            asset_os: darwin
          - name: Windows
            os: windows-latest
            asset_os: windows

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build app
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            wails build -tags webkit2_41
          else
            wails build
          fi

      - name: Package Linux app
        if: runner.os == 'Linux'
        shell: bash
        run: |
          arch="$(go env GOARCH)"
          mkdir -p dist/package
          cp build/bin/VulnDock dist/package/VulnDock
          cp build/linux/vulndock.desktop dist/package/vulndock.desktop
          cp build/appicon.png dist/package/vulndock.png
          tar -C dist/package -czf "dist/VulnDock_linux_${arch}.tar.gz" .

      - name: Package macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          arch="$(go env GOARCH)"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/bin/VulnDock.app "dist/VulnDock_darwin_${arch}.zip"

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $arch = (go env GOARCH)
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/bin/VulnDock.exe -DestinationPath "dist/VulnDock_windows_$arch.zip"

      - name: Upload desktop app artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: VulnDock-${{ matrix.asset_os }}
          path: dist/*
          if-no-files-found: error

  package-installers:
    name: Package installer metadata
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download desktop app artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Generate Homebrew and WinGet metadata
        shell: bash
        run: bash scripts/package-release-installers.sh dist

      - name: Upload installer metadata artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: VulnDock-installers
          path: |
            dist/vulndock.rb
            dist/VulnDock_winget_*.zip
          if-no-files-found: error

  docker:
    name: Publish Docker image
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download Linux desktop app artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: VulnDock-linux
          path: dist

      - name: Prepare Docker context
        shell: bash
        run: |
          mkdir -p docker-context
          tar -xzf dist/VulnDock_linux_amd64.tar.gz -C docker-context
          cp packaging/docker/Dockerfile docker-context/Dockerfile

      - name: Set Docker image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vulndock" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: docker-context
          file: docker-context/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
      - package-installers
    runs-on: ubuntu-24.04

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          generate_release_notes: true
