name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.4"
  NODE_VERSION: "22"
  WAILS_VERSION: "v2.12.0"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            asset_os: linux
          - name: macOS
            os: macos-latest
            asset_os: darwin
          - name: Windows
            os: windows-latest
            asset_os: windows

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build app
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            wails build -tags webkit2_41
          else
            wails build
          fi

      - name: Package Linux app
        if: runner.os == 'Linux'
        shell: bash
        run: |
          arch="$(go env GOARCH)"
          mkdir -p dist/package
          cp build/bin/VulnDock dist/package/VulnDock
          cp build/linux/vulndock.desktop dist/package/vulndock.desktop
          cp build/appicon.png dist/package/vulndock.png
          tar -C dist/package -czf "dist/VulnDock_linux_${arch}.tar.gz" .

      - name: Package macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          arch="$(go env GOARCH)"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/bin/VulnDock.app "dist/VulnDock_darwin_${arch}.zip"

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $arch = (go env GOARCH)
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/bin/VulnDock.exe -DestinationPath "dist/VulnDock_windows_$arch.zip"

      - name: Upload desktop app artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: VulnDock-${{ matrix.asset_os }}
          path: dist/VulnDock_*
          if-no-files-found: error

  package-installers:
    name: Package installer metadata
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download desktop app artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: VulnDock-*
          path: dist
          merge-multiple: true

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Generate Homebrew and WinGet metadata
        shell: bash
        run: bash scripts/package-release-installers.sh dist

      - name: Upload installer metadata artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: VulnDock-installers
          path: |
            dist/vulndock.rb
            dist/VulnDock_winget_*.zip
          if-no-files-found: error

  docker:
    name: Publish Docker image
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download Linux desktop app artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: VulnDock-linux
          path: dist

      - name: Prepare Docker context
        shell: bash
        run: |
          mkdir -p docker-context
          tar -xzf dist/VulnDock_linux_amd64.tar.gz -C docker-context
          cp packaging/docker/Dockerfile docker-context/Dockerfile

      - name: Set Docker image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vulndock" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: docker-context
          file: docker-context/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
      - package-installers
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: VulnDock-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          find . -maxdepth 1 -type f ! -name "VulnDock_SHA256SUMS.txt" -printf "%P\0" \
            | sort -z \
            | xargs -0 sha256sum -- > VulnDock_SHA256SUMS.txt

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release assets
        shell: bash
        run: |
          find dist -maxdepth 1 -type f ! -name "*.sigstore.json" -print0 | while IFS= read -r -d '' asset; do
            cosign sign-blob --yes --bundle "${asset}.sigstore.json" "${asset}"
          done

      - name: Publish release assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*
          generate_release_notes: true
