name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check Go formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Check go.mod and go.sum
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Build embedded frontend assets
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

      - name: Run Go tests
        run: go test ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Svelte check
        run: npm run check

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
